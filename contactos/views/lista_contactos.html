$def with(contactos)

<h1>Lista contactos</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Primer Apellido</th>
        <th>Segundo Apellido</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Detalle</th>
    </tr>
    $for contacto in contactos:
        <tr>
            <td>$contacto['id_contacto']</td>
            <td>$contacto['nombre']</td>
            <td>$contacto['primer_apellido']</td>
            <td>$contacto['segundo_apellido']</td>
            <td>$contacto['email']</td>
            <td>$contacto['telefono']</td>
            <td><a href="/ver_contacto/$contacto['id_contacto']"><button>ver</button></a>
            <a href="/modificar_contacto/$contacto['id_contacto']"><button>editar</button></a>
            <a href="/borrar_contacto/$contacto['id_contacto']"><button>borrar</button></a>
            <a href="/insertar_contacto"><button>añadir</button></a>
            </td>
        </tr>
</table>
